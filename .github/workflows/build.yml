name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK with Gradle
        run: |
          gradle init --type basic --dsl groovy --no-incubating 2>/dev/null || true
          cat > build.gradle << 'GRADLE'
          plugins { id 'com.android.application' version '8.1.0' apply false }
          GRADLE
          cat > settings.gradle << 'GRADLE'
          pluginManagement { repositories { google(); mavenCentral() } }
          dependencyResolutionManagement { repositories { google(); mavenCentral() } }
          include ':app'
          GRADLE
          mkdir -p app/src/main
          cat > app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android {
            compileSdk 34
            defaultConfig {
              applicationId "com.hunabku.app"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
          }
          GRADLE
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: hunabku-apk
          path: app/build/outputs/apk/debug/
