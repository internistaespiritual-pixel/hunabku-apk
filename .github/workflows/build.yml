name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Gradle y proyecto
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          GRADLE=$PWD/gradle-8.4/bin/gradle
          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF
          echo "android.useAndroidX=true" > gradle.properties
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 34
            defaultConfig {
              applicationId "com.hunabku.app"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode 1
              versionName "1.0"
            }
          }
          EOF
          $GRADLE wrapper --gradle-version 8.4
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: hunabku-apk
          path: app/build/outputs/apk/debug/app-debug.apk
